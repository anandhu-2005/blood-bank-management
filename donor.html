<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Donor - LifeLine Blood Bank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; min-height: 100vh; }
        .navbar { background-color: #212529 !important; }
        .auth-container { display: none; }
        .auth-container.show { display: block; }
        .form-container { display: none; }
        .form-container.show { display: block; }
        .tab-content { margin-top: 20px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html"><i class="fas fa-tint me-2 text-danger"></i>LifeLine</a>
            <div class="navbar-nav ms-auto" id="navbarRight">
                <span id="userGreeting" class="text-white me-3" style="display:none;"></span>
                <button id="logoutBtn" type="button" class="btn btn-outline-light btn-sm" style="display:none;">Logout</button>
                <a href="index.html" class="btn btn-outline-light btn-sm" id="backBtn">Back to Home</a>
            </div>
        </div>
    </nav>

    <!-- Auth Container (Login/Register) -->
    <div class="auth-container show">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card shadow-lg border-0">
                        <div class="card-header bg-danger text-white text-center py-3">
                            <h4>Donor Portal</h4>
                        </div>
                        <div class="card-body p-4">
                            <!-- Tabs for Login/Register -->
                            <ul class="nav nav-tabs mb-3" id="authTabs" role="tablist">
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab">Login</button>
                                </li>
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab">Register</button>
                                </li>
                            </ul>

                            <div class="tab-content" id="authTabContent">
                                <!-- Login Tab -->
                                <div class="tab-pane fade show active" id="login" role="tabpanel">
                                    <form id="loginForm">
                                        <div class="mb-3">
                                            <label class="form-label">Donor ID</label>
                                            <input type="number" class="form-control" id="loginDonorId" placeholder="Enter your Donor ID">
                                            <div class="text-center text-muted my-2 small">— or —</div>
                                            <label class="form-label">Email</label>
                                            <input type="email" class="form-control" id="loginEmail" placeholder="Enter your email">
                                        </div>
                                        <button type="submit" class="btn btn-danger w-100 py-2">Login</button>
                                    </form>
                                </div>

                                <!-- Register Tab -->
                                <div class="tab-pane fade" id="register" role="tabpanel">
                                    <form id="registerForm">
                                        <div class="row">
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">First Name</label>
                                                <input type="text" class="form-control" id="regFirstName" required>
                                            </div>
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Last Name</label>
                                                <input type="text" class="form-control" id="regLastName" required>
                                            </div>
                                        </div>
                                        <div class="row">
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Email</label>
                                                <input type="email" class="form-control" id="regEmail" required>
                                            </div>
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Phone Number</label>
                                                <input type="tel" class="form-control" id="regPhone" required>
                                            </div>
                                        </div>
                                        <div class="row">
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Blood Group</label>
                                                <select class="form-select" id="regBloodGroup" required>
                                                    <option value="" disabled selected>Select</option>
                                                    <option>A+</option><option>A-</option>
                                                    <option>B+</option><option>B-</option>
                                                    <option>O+</option><option>O-</option>
                                                    <option>AB+</option><option>AB-</option>
                                                </select>
                                            </div>
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Gender</label>
                                                <select class="form-select" id="regGender">
                                                    <option value="">Not specified</option>
                                                    <option>Male</option>
                                                    <option>Female</option>
                                                    <option>Other</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">Date of Birth</label>
                                            <input type="date" class="form-control" id="regDateOfBirth">
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">Address</label>
                                            <input type="text" class="form-control" id="regAddress">
                                        </div>
                                        <button type="submit" class="btn btn-danger w-100 py-2">Register</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Donor Dashboard (shown after login) -->
    <div class="form-container">
        <div class="container py-5">
            <div class="row justify-content-center g-4">

                <!-- Donor Info Card -->
                <div class="col-md-5">
                    <div class="card shadow-sm border-0 h-100">
                        <div class="card-header bg-danger text-white py-3">
                            <h5 class="mb-0"><i class="fas fa-user me-2"></i>My Donor Profile</h5>
                        </div>
                        <div class="card-body p-4">
                            <div class="text-center mb-4">
                                <div style="width:70px;height:70px;background:#f8d7da;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto;">
                                    <i class="fas fa-tint fa-2x text-danger"></i>
                                </div>
                                <h5 class="mt-3 mb-0 fw-bold" id="dashName">—</h5>
                                <span class="badge bg-danger mt-1" id="dashBloodGroup">—</span>
                            </div>
                            <div class="mb-2 small"><span class="text-muted">Donor ID:</span> <strong id="dashDonorId">—</strong></div>
                            <div class="mb-2 small"><span class="text-muted">Email:</span> <strong id="dashEmail">—</strong></div>
                            <div class="mb-2 small"><span class="text-muted">Phone:</span> <strong id="dashPhone">—</strong></div>
                            <div class="mb-2 small"><span class="text-muted">Gender:</span> <strong id="dashGender">—</strong></div>
                            <div class="mb-2 small"><span class="text-muted">Date of Birth:</span> <strong id="dashDob">—</strong></div>
                            <div class="mb-3 small"><span class="text-muted">Address:</span> <strong id="dashAddress">—</strong></div>
                            <div class="mb-2 small"><span class="text-muted">Eligibility:</span> <strong id="dashEligibility">—</strong></div>
                            <hr>
                            <button class="btn btn-outline-danger w-100" onclick="showEditForm()">
                                <i class="fas fa-edit me-2"></i>Edit My Details
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Actions Card -->
                <div class="col-md-4">
                    <div class="card shadow-sm border-0 mb-3">
                        <div class="card-body p-4">
                            <h6 class="fw-bold mb-3"><i class="fas fa-th me-2 text-danger"></i>Quick Actions</h6>
                            <a href="appointment.html" class="btn btn-danger w-100 mb-2 py-2">
                                <i class="fas fa-calendar-plus me-2"></i>Book Appointment
                            </a>
                            <a href="inventory.html" class="btn btn-outline-secondary w-100 py-2">
                                <i class="fas fa-database me-2"></i>View Blood Inventory
                            </a>
                        </div>
                    </div>
                    <div class="card shadow-sm border-0 bg-light border-start border-danger border-3">
                        <div class="card-body p-3">
                            <p class="small text-muted mb-1"><i class="fas fa-info-circle me-1 text-danger"></i><strong>Your Donor ID</strong></p>
                            <h3 class="fw-bold text-danger mb-1" id="dashDonorIdBig">—</h3>
                            <p class="small text-muted mb-0">Use this ID to login next time</p>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Edit Form (hidden by default) -->
            <div class="row justify-content-center mt-4" id="editFormRow" style="display:none !important;">
                <div class="col-md-6">
                    <div class="card shadow-sm border-0">
                        <div class="card-header bg-white border-bottom py-3 d-flex justify-content-between align-items-center">
                            <h5 class="mb-0 fw-bold"><i class="fas fa-edit me-2 text-danger"></i>Edit Donor Details</h5>
                            <button class="btn btn-sm btn-outline-secondary" onclick="hideEditForm()">
                                <i class="fas fa-times"></i> Cancel
                            </button>
                        </div>
                        <div class="card-body p-4">
                            <form id="donorForm">
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">First Name</label>
                                        <input type="text" class="form-control" id="fName" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Last Name</label>
                                        <input type="text" class="form-control" id="lName" required>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Blood Group</label>
                                    <select class="form-select" id="bloodGroup">
                                        <option>A+</option><option>B+</option><option>O+</option><option>AB+</option>
                                        <option>A-</option><option>B-</option><option>O-</option><option>AB-</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Gender</label>
                                    <select class="form-select" id="gender">
                                        <option value="">Not specified</option>
                                        <option>Male</option>
                                        <option>Female</option>
                                        <option>Other</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Date of Birth</label>
                                    <input type="date" class="form-control" id="dateOfBirth">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Address</label>
                                    <input type="text" class="form-control" id="address">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Phone Number</label>
                                    <input type="tel" class="form-control" id="phone" required>
                                </div>
                                <div class="d-grid gap-2">
                                    <button type="submit" class="btn btn-danger py-2">
                                        <i class="fas fa-save me-2"></i>Save Changes
                                    </button>
                                    <button type="button" class="btn btn-outline-secondary" onclick="hideEditForm()">Cancel</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = 'http://localhost:4001/api';

        function getCurrentUser() {
            const data = localStorage.getItem('bloodbank_currentUser');
            return data ? JSON.parse(data) : null;
        }

        function setCurrentUser(user) {
            localStorage.setItem('bloodbank_currentUser', JSON.stringify(user));
        }

        function logout() {
            localStorage.removeItem('bloodbank_currentUser');
            location.reload();
        }

        function updateUI() {
            const user = getCurrentUser();
            const authContainer = document.querySelector('.auth-container');
            const formContainer = document.querySelector('.form-container');
            const userGreeting = document.getElementById('userGreeting');
            const logoutBtn = document.getElementById('logoutBtn');

            if (user && user.role === 'donor') {
                authContainer.classList.remove('show');
                formContainer.classList.add('show');
                userGreeting.textContent = `Welcome, ${user.name}!`;
                userGreeting.style.display = 'inline';
                logoutBtn.style.display = 'inline-block';
                loadDonorProfile(user);
            } else {
                authContainer.classList.add('show');
                formContainer.classList.remove('show');
                userGreeting.style.display = 'none';
                logoutBtn.style.display = 'none';
            }
        }

        async function loadDonorProfile(user) {
            // Fill dashboard with stored user info first
            document.getElementById('dashName').textContent = user.name || '—';
            document.getElementById('dashEmail').textContent = user.email || '—';
            document.getElementById('dashBloodGroup').textContent = user.bloodGroup || '—';
            document.getElementById('dashDonorId').textContent = user.donorId || '—';
            document.getElementById('dashDonorIdBig').textContent = user.donorId || '—';

            // Fetch full profile from server
            try {
                const res = await fetch(`${API_BASE}/donors/profile?email=${encodeURIComponent(user.email)}`);
                const data = await res.json();
                if (!res.ok) return;
                const d = data.donor;
                document.getElementById('dashName').textContent = `${d.first_name} ${d.last_name}`;
                document.getElementById('dashBloodGroup').textContent = d.blood_group || '—';
                document.getElementById('dashDonorId').textContent = d.donor_id;
                document.getElementById('dashDonorIdBig').textContent = d.donor_id;
                document.getElementById('dashEmail').textContent = d.email || '—';
                document.getElementById('dashPhone').textContent = d.phone || '—';
                document.getElementById('dashGender').textContent = d.gender || '—';
                document.getElementById('dashDob').textContent = d.date_of_birth ? (Array.isArray(d.date_of_birth) ? d.date_of_birth[0] : d.date_of_birth).slice(0,10) : '—';
                document.getElementById('dashAddress').textContent = d.address ? (Array.isArray(d.address) ? d.address[0] : d.address) : '—';
                document.getElementById('dashEligibility').textContent = d.eligibility_status || '—';

                // Pre-fill edit form
                document.getElementById('fName').value = d.first_name || '';
                document.getElementById('lName').value = d.last_name || '';
                document.getElementById('bloodGroup').value = d.blood_group || 'A+';
                document.getElementById('gender').value = d.gender || '';
                document.getElementById('phone').value = d.phone || '';
                document.getElementById('address').value = d.address ? (Array.isArray(d.address) ? d.address[0] : d.address) : '';
                if (d.date_of_birth) {
                    const dob = Array.isArray(d.date_of_birth) ? d.date_of_birth[0] : d.date_of_birth;
                    document.getElementById('dateOfBirth').value = dob ? dob.slice(0,10) : '';
                }
            } catch(e) {
                console.warn('Could not load full profile', e);
            }
        }

        function showEditForm() {
            document.getElementById('editFormRow').style.setProperty('display', 'flex', 'important');
            document.getElementById('editFormRow').scrollIntoView({ behavior: 'smooth' });
        }

        function hideEditForm() {
            document.getElementById('editFormRow').style.setProperty('display', 'none', 'important');
        }

        async function apiPost(path, body) {
            const res = await fetch(`${API_BASE}${path}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const json = await res.json();
            if (!res.ok) throw new Error(json.error || 'Server error');
            return json;
        }

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            try {
                const donorId = document.getElementById('loginDonorId').value.trim();
                const email = document.getElementById('loginEmail').value.trim();
                if (!donorId && !email) { alert('Please enter your Donor ID or Email.'); return; }
                const result = await apiPost('/donors/login', { donorId: donorId || null, email: email || null });
                setCurrentUser({
                    role: 'donor',
                    name: `${result.donor.first_name} ${result.donor.last_name}`,
                    email: result.donor.email,
                    donorId: result.donor.donor_id,
                    bloodGroup: result.donor.blood_group
                });
                updateUI();
                document.getElementById('loginForm').reset();
            } catch (err) {
                alert(err.message);
            }
        };

        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            try {
                const firstName = document.getElementById('regFirstName').value;
                const lastName = document.getElementById('regLastName').value;
                const email = document.getElementById('regEmail').value;
                const phone = document.getElementById('regPhone').value;
                const bloodGroup = document.getElementById('regBloodGroup').value;
                const gender = document.getElementById('regGender').value;
                const dateOfBirth = document.getElementById('regDateOfBirth').value;
                const address = document.getElementById('regAddress').value;

                const result = await apiPost('/donors/register', {
                    firstName,
                    lastName,
                    email,
                    phone,
                    bloodGroup,
                    gender,
                    dateOfBirth,
                    address
                });

                setCurrentUser({
                    role: 'donor',
                    name: `${result.donor.first_name} ${result.donor.last_name}`,
                    email: result.donor.email,
                    donorId: result.donor.donor_id,
                    bloodGroup: result.donor.blood_group
                });
                updateUI();
                document.getElementById('registerForm').reset();
                alert(`Registration successful!\n\n🩸 Your Donor ID is: ${result.donor.donor_id}\n\nPlease save this ID — you can use it to login next time.`);
            } catch (err) {
                alert(err.message);
            }
        };

        document.getElementById('donorForm').onsubmit = async (e) => {
            e.preventDefault();
            try {
                const currentUser = getCurrentUser();
                if (!currentUser || !currentUser.email) {
                    throw new Error('Please login before submitting donor info.');
                }

                const donorData = {
                    email: currentUser.email,
                    first_name: document.getElementById('fName').value,
                    last_name: document.getElementById('lName').value,
                    blood_group: document.getElementById('bloodGroup').value,
                    phone: document.getElementById('phone').value,
                    gender: document.getElementById('gender').value || null,
                    dateOfBirth: document.getElementById('dateOfBirth').value || null,
                    address: document.getElementById('address').value || null
                };

                await apiPost('/donors/info', donorData);
                alert('Details updated successfully!');
                hideEditForm();
                loadDonorProfile(currentUser);
            } catch (err) {
                alert(err.message);
            }
        };

        document.getElementById('logoutBtn').onclick = logout;

        window.onload = updateUI;
    </script>
    <form action="/donor" method="POST">
    <input type="text" name="name" placeholder="Name" required>

    <input type="text" name="blood_group" placeholder="Blood Group" required>

    <input type="text" name="phone" placeholder="Phone Number" required>

    <button type="submit">Submit</button>
</form>
</body>
</html>
