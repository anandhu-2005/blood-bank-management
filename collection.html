<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blood Collection Centre - LifeLine Blood Bank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; min-height: 100vh; }
        .navbar { background-color: #212529 !important; }
        .auth-container { display: none; }
        .auth-container.show { display: block; }
        .form-container { display: none; }
        .form-container.show { display: block; }
        .tab-content { margin-top: 20px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html"><i class="fas fa-tint me-2 text-danger"></i>LifeLine</a>
            <div class="navbar-nav ms-auto" id="navbarRight">
                <span id="userGreeting" class="text-white me-3" style="display:none;"></span>
                <button id="logoutBtn" type="button" class="btn btn-outline-light btn-sm" style="display:none;">Logout</button>
                <a href="index.html" class="btn btn-outline-light btn-sm" id="backBtn">Back to Home</a>
            </div>
        </div>
    </nav>

    <!-- Auth Container (Login/Register) -->
    <div class="auth-container show">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card shadow-lg border-0">
                        <div class="card-header bg-success text-white text-center py-3">
                            <h4>Blood Collection Centre Portal</h4>
                        </div>
                        <div class="card-body p-4">
                            <!-- Tabs for Login/Register -->
                            <ul class="nav nav-tabs mb-3" id="authTabs" role="tablist">
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab">Login</button>
                                </li>
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab">Register</button>
                                </li>
                            </ul>

                            <div class="tab-content" id="authTabContent">
                                <!-- Login Tab -->
                                <div class="tab-pane fade show active" id="login" role="tabpanel">
                                    <form id="loginForm">
                                        <div class="mb-3">
                                            <label class="form-label">Email</label>
                                            <input type="email" class="form-control" id="loginEmail" required>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">Password</label>
                                            <input type="password" class="form-control" id="loginPassword" required>
                                        </div>
                                        <button type="submit" class="btn btn-success w-100 py-2">Login</button>
                                    </form>
                                </div>

                                <!-- Register Tab -->
                                <div class="tab-pane fade" id="register" role="tabpanel">
                                    <form id="registerForm">
                                        <div class="mb-3">
                                            <label class="form-label">Collection Centre Name</label>
                                            <input type="text" class="form-control" id="regCentreName" required>
                                        </div>
                                        <div class="row">
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">License / Registration No.</label>
                                                <input type="text" class="form-control" id="regLicense" required>
                                            </div>
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Email</label>
                                                <input type="email" class="form-control" id="regEmail" required>
                                            </div>
                                        </div>
                                        <div class="row">
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Password</label>
                                                <input type="password" class="form-control" id="regPassword" required>
                                            </div>
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Contact Person</label>
                                                <input type="text" class="form-control" id="regContactPerson" required>
                                            </div>
                                        </div>
                                        <div class="row">
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Phone Number</label>
                                                <input type="tel" class="form-control" id="regPhone" required>
                                            </div>
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">City/Region</label>
                                                <input type="text" class="form-control" id="regCity" required>
                                            </div>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">Full Address</label>
                                            <input type="text" class="form-control" id="regAddress" required>
                                        </div>
                                        <button type="submit" class="btn btn-success w-100 py-2">Register</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Blood Collection Form Container (shown after auth) -->
    <div class="form-container">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card shadow-lg border-0">
                        <div class="card-header bg-success text-white text-center py-3">
                            <h4>Add Collected Blood to Inventory</h4>
                        </div>
                        <div class="card-body p-4">
                            <form id="collectionForm">
                                <div class="mb-3">
                                    <label class="form-label">Collection Centre Name</label>
                                    <input type="text" class="form-control" id="colCentreName">
                                </div>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Blood Group</label>
                                        <select class="form-select" id="bloodGroup" required>
                                            <option value="">Select Group</option>
                                            <option>A+</option><option>B+</option><option>O+</option><option>AB+</option>
                                            <option>A-</option><option>B-</option><option>O-</option><option>AB-</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Component Type</label>
                                        <select class="form-select" id="componentType" required>
                                            <option value="">Select Component</option>
                                            <option>Whole Blood</option>
                                            <option>Plasma</option>
                                            <option>Platelets</option>
                                            <option>Red Blood Cells</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Units Collected</label>
                                        <input type="number" class="form-control" id="units" min="1" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Collection Date</label>
                                        <input type="date" class="form-control" id="collectionDate" required>
                                    </div>
                                </div>
                                <div class="row"><div class="col-md-6 mb-3"><label class="form-label">Expiry Date <span class="text-muted small">(Optional)</span></label><input type="date" class="form-control" id="expiryDate"></div><div class="col-md-6 mb-3"><div class="mb-3">
                                    <label class="form-label">Donor ID (Optional)</label>
                                    <input type="text" class="form-control" id="donorId" placeholder="Reference donor if available">
                                </div>
                                <button type="submit" class="btn btn-success w-100 py-2">Add to Inventory</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = 'http://localhost:4001/api';

        function getCurrentUser() {
            const data = localStorage.getItem('bloodbank_currentUser');
            return data ? JSON.parse(data) : null;
        }

        function setCurrentUser(user) {
            localStorage.setItem('bloodbank_currentUser', JSON.stringify(user));
        }

        function logout() {
            localStorage.removeItem('bloodbank_currentUser');
            location.href = 'index.html';
        }

        function updateUI() {
            const user = getCurrentUser();
            const authContainer = document.querySelector('.auth-container');
            const formContainer = document.querySelector('.form-container');
            const userGreeting = document.getElementById('userGreeting');
            const logoutBtn = document.getElementById('logoutBtn');

            if (user && user.role === 'collection_centre') {
                authContainer.classList.remove('show');
                formContainer.classList.add('show');
                userGreeting.textContent = `Welcome, ${user.name}!`;
                userGreeting.style.display = 'inline';
                logoutBtn.style.display = 'inline-block';
                
                const centreNameInput = document.getElementById('colCentreName');
                if (centreNameInput) {
                    centreNameInput.value = user.name;
                    centreNameInput.readOnly = true;
                }
            } else {
                authContainer.classList.add('show');
                formContainer.classList.remove('show');
                userGreeting.style.display = 'none';
                logoutBtn.style.display = 'none';
            }
        }

        async function apiPost(path, body) {
            const res = await fetch(`${API_BASE}${path}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const json = await res.json();
            if (!res.ok) throw new Error(json.error || 'Server error');
            return json;
        }

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            try {
                const email = document.getElementById('loginEmail').value;
                const result = await apiPost('/staff/login', { email });
                setCurrentUser({ role: 'collection_centre', name: result.staff.staff_name, email: result.staff.email, staffId: result.staff.staff_id });
                updateUI();
                document.getElementById('loginForm').reset();
            } catch (err) {
                alert(err.message);
            }
        };

        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            try {
                const centreName = document.getElementById('regCentreName').value;
                const licenseNo = document.getElementById('regLicense').value;
                const email = document.getElementById('regEmail').value;
                const password = document.getElementById('regPassword').value;
                const contactPerson = document.getElementById('regContactPerson').value;
                const phone = document.getElementById('regPhone').value;
                const city = document.getElementById('regCity').value;
                const address = document.getElementById('regAddress').value;

                const result = await apiPost('/staff/register', {
                    centreName, licenseNo, email, password, contactPerson, phone, city, address
                });

                setCurrentUser({ role: 'collection_centre', name: result.staff.staff_name, email: result.staff.email, staffId: result.staff.staff_id });
                updateUI();
                document.getElementById('registerForm').reset();
                alert('Registration successful');
            } catch (err) {
                alert(err.message);
            }
        };

        document.getElementById('collectionForm').onsubmit = async (e) => {
            e.preventDefault();
            try {
                const user = getCurrentUser();
                if (!user) throw new Error('Please login first');

                const bloodGroup = document.getElementById('bloodGroup').value;
                const componentType = document.getElementById('componentType').value;
                const quantity = document.getElementById('units').value;
                const collectionDate = document.getElementById('collectionDate') ? document.getElementById('collectionDate').value : null;
                const expiryDate = document.getElementById('expiryDate') ? document.getElementById('expiryDate').value || null : null;
                const donorId = document.getElementById('donorId') ? document.getElementById('donorId').value || null : null;

                if (!bloodGroup) { alert('Please select a blood group.'); return; }
                if (!componentType) { alert('Please select a component type.'); return; }
                if (!quantity || parseInt(quantity) <= 0) { alert('Please enter a valid quantity.'); return; }

                const result = await apiPost('/blood-collection', {
                    staffId: user.staffId || 1,
                    bloodGroup,
                    componentType,
                    quantity,
                    collectionDate: collectionDate || null,
                    expiryDate,
                    donorId
                });

                alert(result.message || `Blood collection recorded: ${bloodGroup} - ${quantity} units of ${componentType}`);
                document.getElementById('collectionForm').reset();
            } catch (err) {
                alert(err.message);
            }
        };

        document.getElementById('logoutBtn').onclick = logout;

        window.onload = updateUI;
    </script>
</body>
</html>
