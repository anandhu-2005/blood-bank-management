<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hospital - LifeLine Blood Bank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; min-height: 100vh; }
        .navbar { background-color: #212529 !important; }
        .auth-container { display: none; }
        .auth-container.show { display: block; }
        .form-container { display: none; }
        .form-container.show { display: block; }
        .tab-content { margin-top: 20px; }
        .status-badge { font-size: 0.8rem; padding: 5px 10px; border-radius: 20px; }
        .bg-available { background-color: #d1e7dd; color: #0f5132; }
        .bg-critical { background-color: #f8d7da; color: #842029; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html"><i class="fas fa-tint me-2 text-danger"></i>LifeLine</a>
            <div class="navbar-nav ms-auto" id="navbarRight">
                <span id="userGreeting" class="text-white me-3" style="display:none;"></span>
                <button id="logoutBtn" type="button" class="btn btn-outline-light btn-sm" style="display:none;">Logout</button>
                <a href="index.html" class="btn btn-outline-light btn-sm" id="backBtn">Back to Home</a>
            </div>
        </div>
    </nav>

    <!-- Auth Container (Login/Register) -->
    <div class="auth-container show">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card shadow-lg border-0">
                        <div class="card-header bg-dark text-white text-center py-3">
                            <h4>Hospital Portal</h4>
                        </div>
                        <div class="card-body p-4">
                            <!-- Tabs for Login/Register -->
                            <ul class="nav nav-tabs mb-3" id="authTabs" role="tablist">
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab">Login</button>
                                </li>
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab">Register</button>
                                </li>
                            </ul>

                            <div class="tab-content" id="authTabContent">
                                <!-- Login Tab -->
                                <div class="tab-pane fade show active" id="login" role="tabpanel">
                                    <form id="loginForm">
                                        <div class="mb-3">
                                            <label class="form-label">Email</label>
                                            <input type="email" class="form-control" id="loginEmail" required>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">Password</label>
                                            <input type="password" class="form-control" id="loginPassword" required>
                                        </div>
                                        <button type="submit" class="btn btn-dark w-100 py-2">Login</button>
                                    </form>
                                </div>

                                <!-- Register Tab -->
                                <div class="tab-pane fade" id="register" role="tabpanel">
                                    <form id="registerForm">
                                        <div class="mb-3">
                                            <label class="form-label">Hospital Name</label>
                                            <input type="text" class="form-control" id="regHospitalName" required>
                                        </div>
                                        <div class="row">
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">License / Registration No.</label>
                                                <input type="text" class="form-control" id="regLicense" required>
                                            </div>
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Hospital Type</label>
                                                <select class="form-select" id="regType" required>
                                                    <option value="" disabled selected>Select Type</option>
                                                    <option>Government</option>
                                                    <option>Private</option>
                                                    <option>Clinic</option>
                                                    <option>Multi-Speciality</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div class="row">
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Email</label>
                                                <input type="email" class="form-control" id="regEmail" required>
                                            </div>
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Password</label>
                                                <input type="password" class="form-control" id="regPassword" required>
                                            </div>
                                        </div>
                                        <div class="row">
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Contact Person</label>
                                                <input type="text" class="form-control" id="regContactPerson" required>
                                            </div>
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Emergency Phone</label>
                                                <input type="tel" class="form-control" id="regPhone" required>
                                            </div>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">Full Address</label>
                                            <input type="text" class="form-control" id="regAddress" required>
                                        </div>
                                        <button type="submit" class="btn btn-dark w-100 py-2">Register</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Hospital Request Form Container (shown after auth) -->
    <div class="form-container">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card shadow-lg border-0">
                        <div class="card-header bg-dark text-white text-center py-3">
                            <h4>Hospital Dashboard</h4>
                        </div>
                        <div class="card-body p-4">
                            <!-- View Inventory Button -->
                            <div class="text-center mb-4">
                                <button id="viewInventoryBtn" class="btn btn-info btn-lg">
                                    <i class="fas fa-database me-2"></i>View Blood Inventory
                                </button>
                            </div>

                            <!-- Blood Request Form -->
                            <form id="requestForm">
                                <div class="mb-3">
                                    <label class="form-label">Hospital Name</label>
                                    <input type="text" class="form-control" id="hospName" required>
                                </div>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Blood Group Needed</label>
                                        <select class="form-select" id="reqGroup" required>
                                            <option value="">Select Group</option>
                                            <option>A+</option><option>B+</option><option>O+</option><option>AB+</option>
                                            <option>A-</option><option>B-</option><option>O-</option><option>AB-</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Units (Quantity)</label>
                                        <input type="number" class="form-control" id="units" min="1" required>
                                    </div>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label">Urgency Level</label>
                                    <select class="form-select" id="urgency" required>
                                        <option value="">Select Urgency</option>
                                        <option>Normal</option>
                                        <option class="text-danger fw-bold">EMERGENCY</option>
                                    </select>
                                </div>
                                <button type="submit" class="btn btn-dark w-100 py-2">Send Request</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Inventory Modal -->
    <div class="modal fade" id="inventoryModal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Blood Inventory</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-0">
                    <div class="row g-0">
                        <!-- Left Sidebar Filter -->
                        <div class="col-md-3 border-end bg-light p-4">
                            <h6 class="fw-bold mb-3"><i class="fas fa-filter me-2 text-danger"></i>Needed Group</h6>
                            <div class="form-check mb-2">
                                <input class="form-check-input hosp-blood-filter" type="checkbox" id="hbgApos" value="A+" onchange="loadInventoryForHospital()">
                                <label class="form-check-label" for="hbgApos">A+</label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input hosp-blood-filter" type="checkbox" id="hbgAneg" value="A-" onchange="loadInventoryForHospital()">
                                <label class="form-check-label" for="hbgAneg">A-</label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input hosp-blood-filter" type="checkbox" id="hbgBpos" value="B+" onchange="loadInventoryForHospital()">
                                <label class="form-check-label" for="hbgBpos">B+</label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input hosp-blood-filter" type="checkbox" id="hbgBneg" value="B-" onchange="loadInventoryForHospital()">
                                <label class="form-check-label" for="hbgBneg">B-</label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input hosp-blood-filter" type="checkbox" id="hbgOpos" value="O+" onchange="loadInventoryForHospital()">
                                <label class="form-check-label" for="hbgOpos">O+</label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input hosp-blood-filter" type="checkbox" id="hbgOneg" value="O-" onchange="loadInventoryForHospital()">
                                <label class="form-check-label" for="hbgOneg">O-</label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input hosp-blood-filter" type="checkbox" id="hbgABpos" value="AB+" onchange="loadInventoryForHospital()">
                                <label class="form-check-label" for="hbgABpos">AB+</label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input hosp-blood-filter" type="checkbox" id="hbgABneg" value="AB-" onchange="loadInventoryForHospital()">
                                <label class="form-check-label" for="hbgABneg">AB-</label>
                            </div>
                            <hr>
                            <button class="btn btn-outline-secondary btn-sm w-100" onclick="document.querySelectorAll('.hosp-blood-filter').forEach(cb => cb.checked = false); loadInventoryForHospital();">Clear Filters</button>
                        </div>
                        
                        <!-- Main Table Content -->
                        <div class="col-md-9 p-4">
                            <div class="table-responsive">
                        <table class="table table-hover">
                            <thead class="table-light">
                                <tr>
                                    <th>Blood Group</th>
                                    <th>Component</th>
                                    <th>Units</th>
                                    <th>Status</th>
                                    <th class="text-center">Action</th>
                                </tr>
                            </thead>
                            <tbody id="inventoryTableBody">
                                <tr>
                                    <td colspan="5" class="text-center py-4">
                                        <div class="spinner-border text-danger" role="status"></div>
                                        <p>Loading inventory...</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Auth utility functions
        function getHospitals() {
            const data = localStorage.getItem('bloodbank_hospitals');
            return data ? JSON.parse(data) : [];
        }

        function saveHospitals(hospitals) {
            localStorage.setItem('bloodbank_hospitals', JSON.stringify(hospitals));
        }

        function getCurrentUser() {
            const data = localStorage.getItem('bloodbank_currentUser');
            return data ? JSON.parse(data) : null;
        }

        function setCurrentUser(user) {
            localStorage.setItem('bloodbank_currentUser', JSON.stringify(user));
        }

        function logout() {
            localStorage.removeItem('bloodbank_currentUser');
            location.href = 'index.html';
        }

        function updateUI() {
            const user = getCurrentUser();
            const authContainer = document.querySelector('.auth-container');
            const formContainer = document.querySelector('.form-container');
            const userGreeting = document.getElementById('userGreeting');
            const logoutBtn = document.getElementById('logoutBtn');

            if (user && user.role === 'hospital') {
                authContainer.classList.remove('show');
                formContainer.classList.add('show');
                userGreeting.textContent = `Welcome, ${user.name}!`;
                userGreeting.style.display = 'inline';
                logoutBtn.style.display = 'inline-block';
                
                // Auto-fill hospital name in form
                const hospNameInput = document.getElementById('hospName');
                if (hospNameInput) {
                    hospNameInput.value = user.name;
                    hospNameInput.readOnly = true;
                }
            } else {
                authContainer.classList.add('show');
                formContainer.classList.remove('show');
                userGreeting.style.display = 'none';
                logoutBtn.style.display = 'none';
            }
        }

        // Login handler
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            const hospitals = getHospitals();
            const hospital = hospitals.find(h => h.email === email && h.password === password);

            if (hospital) {
                setCurrentUser({ role: 'hospital', name: hospital.name, email: hospital.email });
                updateUI();
                document.getElementById('loginForm').reset();
            } else {
                alert('Invalid email or password');
            }
        };

        // Register handler
        document.getElementById('registerForm').onsubmit = (e) => {
            e.preventDefault();
            const name = document.getElementById('regHospitalName').value;
            const license = document.getElementById('regLicense').value;
            const type = document.getElementById('regType').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const contactPerson = document.getElementById('regContactPerson').value;
            const phone = document.getElementById('regPhone').value;
            const address = document.getElementById('regAddress').value;

            const hospitals = getHospitals();
            if (hospitals.find(h => h.email === email)) {
                alert('Email already registered');
                return;
            }

            hospitals.push({ name, license, type, email, password, contactPerson, phone, address });
            saveHospitals(hospitals);
            setCurrentUser({ role: 'hospital', name, email });
            updateUI();
            document.getElementById('registerForm').reset();
        };

        // Request form handler
        document.getElementById('requestForm').onsubmit = (e) => {
            e.preventDefault();
            const requestData = {
                hospital: document.getElementById('hospName').value,
                blood_group: document.getElementById('reqGroup').value,
                units: document.getElementById('units').value,
                urgency: document.getElementById('urgency').value
            };
            alert('Request submitted for: ' + requestData.blood_group + ' - ' + requestData.urgency);
            document.getElementById('requestForm').reset();
        };

        // View Inventory Button
        document.getElementById('viewInventoryBtn').onclick = () => {
            loadInventoryForHospital();
            const modal = new bootstrap.Modal(document.getElementById('inventoryModal'));
            modal.show();
        };

        // Load inventory for hospital view (with Order buttons)
        async function loadInventoryForHospital() {
            let data = [];
            try {
                // Try to fetch from backend database first
                const response = await fetch('/api/inventory');
                if (!response.ok) throw new Error('Backend disconnected');
                data = await response.json();
            } catch (backendError) {
                console.log("Backend not connected, using localStorage fallback.");
                // Fallback to local storage if backend isn't ready
                data = JSON.parse(localStorage.getItem('bloodbank_inventory')) || [];
            }

            try {
                const tableBody = document.getElementById('inventoryTableBody');
                tableBody.innerHTML = '';

                const checkedBoxes = Array.from(document.querySelectorAll('.hosp-blood-filter:checked')).map(cb => cb.value);
                if (checkedBoxes.length > 0) {
                    data = data.filter(item => checkedBoxes.includes(item.blood_group));
                }

                if (data.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-muted">No inventory found. Awaiting database connection.</td></tr>';
                    return;
                }

                data.forEach(item => {
                    const statusClass = item.status === 'Available' ? 'bg-available' : 'bg-critical';
                    tableBody.innerHTML += `
                        <tr>
                            <td class="fw-bold text-danger">${item.blood_group}</td>
                            <td>${item.component_type}</td>
                            <td>${item.quantity}</td>
                            <td><span class="status-badge ${statusClass}">${item.status}</span></td>
                            <td class="text-center">
                                <button class="btn btn-sm btn-primary order-btn" 
                                        data-blood-group="${item.blood_group}"
                                        data-component="${item.component_type}">
                                    Order
                                </button>
                            </td>
                        </tr>`;
                });

                // Add event listeners to Order buttons
                document.querySelectorAll('.order-btn').forEach(btn => {
                    btn.onclick = (e) => {
                        const bloodGroup = e.target.getAttribute('data-blood-group');
                        const component = e.target.getAttribute('data-component');
                        
                        // Auto-fill the request form
                        document.getElementById('reqGroup').value = bloodGroup;
                        
                        // Close modal
                        const modal = bootstrap.Modal.getInstance(document.getElementById('inventoryModal'));
                        modal.hide();
                        
                        // Scroll to form and highlight
                        document.getElementById('requestForm').scrollIntoView({ behavior: 'smooth' });
                        document.getElementById('reqGroup').focus();
                        
                        alert(`Selected ${bloodGroup} (${component}) for order. Please enter quantity and urgency.`);
                    };
                });

            } catch (e) {
                document.getElementById('inventoryTableBody').innerHTML = '<tr><td colspan="5" class="text-center text-danger">Error Loading Inventory.</td></tr>';
            }
        }

        // Logout handler
        document.getElementById('logoutBtn').onclick = logout;

        // Initialize on page load
        window.onload = () => {
            updateUI();
            
            // Check for emergency URL parameter
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('urgency') === 'emergency') {
                const urgencyDropdown = document.getElementById('urgency');
                if (urgencyDropdown) {
                    urgencyDropdown.value = 'EMERGENCY';
                    urgencyDropdown.classList.add('border-danger', 'border-2', 'shadow-sm'); // highlight the dropdown
                }
            }
        };
    </script>
</body>
</html>
